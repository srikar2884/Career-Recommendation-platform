{% extends "base.html" %}

{% block content %}

<div class="upload-container">

<h2>Upload Your Resume</h2>

{% if message %}
<p class="warning">{{message}}</p>
{% endif %}

<form method="POST" enctype="multipart/form-data">

<input type="file" name="resume">

<button class="btn-upload">Upload Resume</button>

</form>

</div>

{% endblock %}
